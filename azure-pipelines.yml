resources:
  repositories:
    - repository: githubMirror
      type: github
      name: oaslananka/codex-app-server-web
      endpoint: github
      ref: refs/heads/main

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.33.0"
  CODEX_PORT: "41000"
  GITHUB_MIRROR_PATH: github-mirror

steps:
  - checkout: self
    clean: true
    fetchDepth: 0
    persistCredentials: true

  - checkout: githubMirror
    clean: true
    fetchDepth: 0
    persistCredentials: true
    path: $(GITHUB_MIRROR_PATH)
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  - task: NodeTool@0
    displayName: Use Node.js $(NODE_VERSION)
    inputs:
      versionSpec: $(NODE_VERSION)

  - script: |
      corepack enable
      corepack prepare pnpm@$(PNPM_VERSION) --activate
    displayName: Enable pnpm

  - script: pnpm install --frozen-lockfile
    displayName: Install dependencies

  - script: pnpm exec playwright install --with-deps chromium
    displayName: Install Playwright browsers

  - script: pnpm protocol:manifest:check
    displayName: Validate official manifest

  - script: pnpm typecheck
    displayName: Typecheck

  - script: pnpm test
    displayName: Unit tests

  - script: pnpm build
    displayName: Build

  - script: |
      MOCK_CODEX_PORT=$(CODEX_PORT) MOCK_SEND_APPROVAL=1 node scripts/mock-codex-app-server.mjs > ci-mock.log 2>&1 &
      echo $! > ci-mock.pid
      sleep 2
    displayName: Start mock Codex backend

  - script: |
      PORT=1989 PORT_FALLBACK=1990 CODEX_PORT=$(CODEX_PORT) pnpm start:ui > ci-ui.log 2>&1 &
      echo $! > ci-ui.pid
      for i in {1..60}; do
        if curl -fsS http://127.0.0.1:1989 >/dev/null; then
          exit 0
        fi
        sleep 2
      done
      cat ci-ui.log
      cat ci-mock.log
      exit 1
    displayName: Start UI server

  - script: SMOKE_APPROVAL=1 pnpm smoke
    displayName: Browser smoke

  - script: |
      if [ -f ci-ui.pid ]; then kill $(cat ci-ui.pid) || true; fi
      if [ -f ci-mock.pid ]; then kill $(cat ci-mock.pid) || true; fi
    displayName: Stop background services
    condition: always()

  - script: |
      set -euo pipefail
      MIRROR_REPO="$(Pipeline.Workspace)/$(GITHUB_MIRROR_PATH)"
      SOURCE_REPO="$(Build.SourcesDirectory)"

      git -C "$MIRROR_REPO" config user.name "azure-pipelines[bot]"
      git -C "$MIRROR_REPO" config user.email "azure-pipelines[bot]@users.noreply.github.com"

      if git -C "$MIRROR_REPO" remote get-url azure >/dev/null 2>&1; then
        git -C "$MIRROR_REPO" remote set-url azure "$SOURCE_REPO"
      else
        git -C "$MIRROR_REPO" remote add azure "$SOURCE_REPO"
      fi

      git -C "$MIRROR_REPO" fetch azure "+refs/heads/main:refs/remotes/azure/main"
      git -C "$MIRROR_REPO" checkout -B main refs/remotes/azure/main
      git -C "$MIRROR_REPO" push origin refs/heads/main:refs/heads/main --force-with-lease
    displayName: Mirror main to GitHub
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
