trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-24.04

variables:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.33.0'
  CODEX_PORT: '41000'

jobs:
  - job: ci
    displayName: Secondary validation
    workspace:
      clean: all
    steps:
      - checkout: self
        clean: 'true'
        fetchDepth: '0'
        persistCredentials: 'false'

      - task: NodeTool@0
        displayName: Use Node.js $(NODE_VERSION)
        inputs:
          versionSpec: $(NODE_VERSION)

      - script: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@$(PNPM_VERSION) --activate
        displayName: Enable pnpm

      - script: pnpm install --frozen-lockfile
        displayName: Install dependencies

      - script: pnpm format:check
        displayName: Format check

      - script: pnpm repo:hygiene:check
        displayName: Repository hygiene

      - script: pnpm exec playwright install --with-deps chromium
        displayName: Install Playwright browsers

      - script: pnpm protocol:manifest:check
        displayName: Validate official manifest

      - script: |
          set -euo pipefail
          git fetch origin main --depth=1
          pnpm protocol:drift:check -- --base-ref origin/main
        displayName: Validate protocol drift

      - script: pnpm typecheck
        displayName: Typecheck

      - script: pnpm test
        displayName: Unit tests

      - script: pnpm build
        displayName: Build

      - script: |
          set -euo pipefail
          cleanup() {
            if [ -f ci-ui.pid ]; then kill "$(cat ci-ui.pid)" 2>/dev/null || true; fi
            if [ -f ci-mock.pid ]; then kill "$(cat ci-mock.pid)" 2>/dev/null || true; fi
          }
          trap cleanup EXIT

          MOCK_CODEX_PORT=$(CODEX_PORT) MOCK_SEND_APPROVAL=1 node scripts/mock-codex-app-server.mjs > ci-mock.log 2>&1 &
          echo $! > ci-mock.pid
          PORT=1989 PORT_FALLBACK=1990 CODEX_PORT=$(CODEX_PORT) pnpm start:ui > ci-ui.log 2>&1 &
          echo $! > ci-ui.pid

          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:1989 >/dev/null; then
              SMOKE_APPROVAL=1 pnpm smoke
              exit 0
            fi
            sleep 2
          done

          cat ci-ui.log
          cat ci-mock.log
          exit 1
        displayName: Browser smoke
